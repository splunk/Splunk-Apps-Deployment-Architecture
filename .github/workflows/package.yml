name: Package Private Apps

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    path:
      - apps/*/**

jobs:
  package-and-upload:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    services:
      splunk:
        image: splunk/splunk:9.1.3
        env:
          SPLUNK_START_ARGS: --answer-yes --no-prompt --accept-license
          SPLUNK_PASSWORD: password
        options: >-
          --health-interval 30s
          --health-timeout 5s
          --health-retries 5
          --name splunk
        ports:
          - 8000:8000
          - 8089:8089
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-cli@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Package Splunk App
        run: |
          ROOT=$(pwd)
          # Find the first-level directory with changes
          CHANGED_FOLDER=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -oE '^apps/[^/]+' | sort -u | head -n 1)
          if [ -z "$CHANGED_FOLDER" ]; then
            echo "No changes detected in app folders. Exiting."
            exit 1
          fi
          echo "Changed folder: $CHANGED_FOLDER"
          mkdir -p $ROOT/dist
          # Packaging all changed apps
          for ch in $CHANGED_FOLDER
          do
            version=$(cat $ch/app.manifest | jq -r '.info.id.name')
            # Copy app to docker
            docker cp packages/$ch ${{ job.services.splunk.id }}:/opt/splunk/etc/apps/$ch
            # Package app leveraging Splunk REST API
            # - default/ content will be automatically merged with local/
            path=$(curl -k -u admin:password https://localhost:8089/services/apps/local/$ch/package?output_mode=json | jq -r '.entry | .[].content.path')

            echo "Downloading App $path"
            docker cp ${{ job.services.splunk.id }}:$path $ROOT/dist/

            cd $ROOT/dist
            echo "Changing app extension spl -> tgz"
            file_name=$(ls *.spl | xargs -I"{}" basename {} .spl)

            mv $file_name.spl $file_name_$version.tgz
            cd $ROOT
          done
      - name: Upload to S3
        run: |
          aws s3 sync ./dist/*.tgz s3://your-s3-bucket-name/apps/
