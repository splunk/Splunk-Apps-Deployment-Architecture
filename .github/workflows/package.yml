name: Package Private Apps

on: workflow_call

jobs:
  package-and-upload:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    services:
      splunk:
        image: splunk/splunk:9.1.3
        env:
          SPLUNK_START_ARGS: --answer-yes --no-prompt --accept-license
          SPLUNK_PASSWORD: password
        options: >-
          --health-interval 30s
          --health-timeout 5s
          --health-retries 5
          --name splunk
        ports:
          - 8000:8000
          - 8089:8089
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Package Splunk App
        run: |
          # Base directory to search
          BASE_DIR="apps"
          ROOT=$(pwd)

          # Check if the base directory exists, then list its subdirectories
          if [ -d "$BASE_DIR" ]; then
            SUBFOLDERS=$(find "$BASE_DIR" -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort -u)
          else
            SUBFOLDERS=""
          fi
          echo "Changed folder: $SUBFOLDERS"
          mkdir -p $ROOT/dist
          # Packaging all changed apps
          for ch in $SUBFOLDERS
          do
            # Copy app to docker
            docker cp packages/$ch ${{ job.services.splunk.id }}:/opt/splunk/etc/apps/$ch
            # Package app leveraging Splunk REST API
            # - default/ content will be automatically merged with local/
            path=$(curl -k -u admin:password https://localhost:8089/services/apps/local/$ch/package?output_mode=json | jq -r '.entry | .[].content.path')

            echo "Downloading App $path"
            docker cp ${{ job.services.splunk.id }}:$path $ROOT/dist/

            cd $ROOT/dist
            echo "Changing app extension spl -> tgz"
            file_name=$(ls *.spl | xargs -I"{}" basename {} .spl)

            mv $file_name.spl $file_name.tgz
            cd $ROOT
          done
      - name: Upload to S3
        continue-on-error: true
        uses: shallwefootball/upload-s3-action@master
        env:
          BASE_DIR : "apps"
        with:
          aws_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
          aws_bucket: 'philips-ci-test'
          source_dir: 'dist'
          destination_dir: 'apps'
