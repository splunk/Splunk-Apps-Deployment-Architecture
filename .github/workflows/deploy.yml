on:
  pull_request:
    types:
      - closed
    branches:
      - main
    path:
      - environments/*/**

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: ["uat/ses", "uat/es", "prod/es", "prod/ses"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.7
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyyaml
      - name: Deploy to ${{ matrix.environment }}
        env:
          # In case of authentication needed to access target server
          SERVER_KEY: ${{ secrets.KEY_${{ matrix.environment | upper }} }}
        run: |
          python deploy.py --env ${{ matrix.environment }}
          echo "Deploying to ${{ matrix.environment }} environment"
