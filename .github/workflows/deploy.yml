name: Deploy Splunk Apps

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - environments/**
jobs:
  download-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - name: "uat/ses"
            token_key: "SPLUNK_TOKEN_UAT_SES"
          - name: "uat/es"
            token_key: "SPLUNK_TOKEN_UAT_ES"
          - name: "prod/es"
            token_key: "SPLUNK_TOKEN_PROD_ES"
          - name: "prod/ses"
            token_key: "SPLUNK_TOKEN_PROD_SES"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyyaml
          pip install boto3 requests schema
      - name: Deploy to ${{ matrix.environment.name }}
        continue-on-error: true
        env:
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          SPLUNK_TOKEN: ${{ secrets[matrix.environment.token_key] }}
          DEPLOYMENT_CONFIG_PATH: "environments/${{ matrix.environment.name }}"
        run: |
          echo "Deploying to ${{ matrix.environment.name }} environment"
          python -u deploy.py
      - name: Upload deployment report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: artifacts/
      - name: Prepare sanitized artifact name
        id: sanitize
        run: echo "SANITIZED_NAME=${{ matrix.environment.name }}" | sed 's/[\/:*?"<>|]/-/g' >> $GITHUB_ENV
      - name: Debugging apps re-package
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.SANITIZED_NAME }}-tgz-files
          path: ./*.tgz

