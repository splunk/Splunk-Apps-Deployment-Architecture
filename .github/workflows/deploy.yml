on:
  push:
    branches:
      - dev-feature
    path:
      - environments/*/**

jobs:
  package-and-upload:
    uses: ./.github/workflows/package.yml
    secrets: inherit

  download-and-deploy:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: package-and-upload
    strategy:
      matrix:
        environment: ["uat/ses", "uat/es", "prod/es", "prod/ses"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.7
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyyaml
          pip install boto3
          pip install requests
      - name: Deploy to ${{ matrix.environment }}
        continue-on-error: true
        env:
          # In case of authentication needed to access target server
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          echo "Deploying to ${{ matrix.environment }} environment"
          python -u deploy.py ${{ matrix.environment }}
      - name: Check temp directory
        continue-on-error: true
        run: |
          ls -alt
          ls -alt temp_unpack/
      - name: Upload deployment report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: artifacts/
